<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="レシピ冷蔵庫">
<link rel="manifest" href="#" id="manifest-link">
<title>レシピ冷蔵庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #252545;
    --surface3: #2e2e55;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --text: #f0f0f5;
    --text2: #9999bb;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(107,203,119,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  /* Header */
  .header {
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    background: rgba(15,15,26,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 4px;
    padding-bottom: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 2px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab-icon { font-size: 18px; }

  /* Pages */
  .page { display: none; padding: 20px; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Section title */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 14px;
    margin-top: 24px;
  }
  .section-title:first-child { margin-top: 0; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* Input */
  input[type=text], textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus, textarea:focus {
    border-color: rgba(255,107,107,0.5);
  }
  textarea { resize: vertical; min-height: 80px; }
  ::placeholder { color: var(--text2); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #ff5252; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface3); }
  .btn-success { background: var(--accent3); color: #1a1a1a; }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Tag / Chip */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 12px;
    background: var(--surface3);
    color: var(--text2);
    margin: 3px;
  }
  .tag.can-make { background: rgba(107,203,119,0.15); color: var(--accent3); }
  .tag.missing { background: rgba(255,107,107,0.15); color: var(--accent); }
  .tag .remove { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
  .tag .remove:hover { opacity: 1; }

  /* Recipe card */
  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .recipe-card:hover { border-color: rgba(255,107,107,0.3); }
  .recipe-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .recipe-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .recipe-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .match-badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
  }
  .match-100 { background: rgba(107,203,119,0.2); color: var(--accent3); }
  .match-high { background: rgba(255,217,61,0.2); color: var(--accent2); }
  .match-low { background: rgba(255,107,107,0.15); color: var(--accent); }
  .ingredient-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .recipe-actions { display: flex; gap: 8px; margin-top: 12px; }

  /* Fridge grid */
  .fridge-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .fridge-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
  }
  .fridge-item button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
  .fridge-item button:hover { color: var(--accent); }

  /* Shopping list */
  .shop-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    transition: opacity 0.2s;
  }
  .shop-item input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--accent3); cursor: pointer; flex-shrink: 0; }
  .shop-item.checked { opacity: 0.4; }
  .shop-item.checked .shop-name { text-decoration: line-through; }
  .shop-name { flex: 1; font-size: 14px; }
  .shop-source { font-size: 11px; color: var(--text2); }

  /* Plan mode */
  .plan-recipe-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .plan-recipe-card.selected { border-color: var(--accent); background: rgba(255,107,107,0.07); }
  .plan-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
  .plan-recipe-card.selected .plan-check { background: var(--accent); border-color: var(--accent); }
  .plan-recipe-info { flex: 1; }
  .plan-recipe-title { font-size: 15px; font-weight: 700; }
  .plan-recipe-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .common-badge { background: rgba(255,217,61,0.2); color: var(--accent2); padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; }

  /* Move to fridge banner */
  .fridge-banner {
    background: linear-gradient(135deg, rgba(107,203,119,0.12), rgba(107,203,119,0.06));
    border: 1px solid rgba(107,203,119,0.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  /* Input row */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-row input { flex: 1; }

  /* URL input area */
  .url-section { margin-bottom: 16px; }
  .or-divider { text-align: center; color: var(--text2); font-size: 12px; margin: 14px 0; display: flex; align-items: center; gap: 10px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Loading */
  .loading { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 13px; padding: 10px 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; line-height: 1.8; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    z-index: 100;
  }
  .bottom-nav-inner { display: flex; max-width: 480px; width: 100%; }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 150;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-close { float: right; background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; line-height: 1; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }

  /* Ingredient tag input */
  .tag-input-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    min-height: 48px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    cursor: text;
  }
  .tag-input-wrap input {
    background: none;
    border: none;
    padding: 4px 6px;
    font-size: 14px;
    min-width: 80px;
    flex: 1;
    outline: none;
  }

  .hint { font-size: 11px; color: var(--text2); margin-top: 5px; }

  /* PWA install banner */
  .install-banner {
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .install-banner-text { flex: 1; font-size: 13px; line-height: 1.5; }
  .install-banner-text strong { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">🥬 レシピ<span>冷蔵庫</span></div>
      <button class="btn btn-secondary btn-sm" onclick="openAddRecipe()">＋ レシピ追加</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showPage('home', this)">
        <span class="tab-icon">🍳</span>今日作れる
      </button>
      <button class="tab" onclick="showPage('recipes', this)">
        <span class="tab-icon">📖</span>レシピ
      </button>
      <button class="tab" onclick="showPage('plan', this)">
        <span class="tab-icon">📅</span>献立計画
      </button>
      <button class="tab" onclick="showPage('fridge', this)">
        <span class="tab-icon">❄️</span>冷蔵庫
      </button>
      <button class="tab" onclick="showPage('shopping', this)">
        <span class="tab-icon">🛒</span>買い物
      </button>
    </div>
  </div>

  <!-- HOME: 今日作れる -->
  <div id="page-home" class="page active">
    <div id="install-hint" class="install-banner" style="display:none">
      <span style="font-size:28px">📲</span>
      <div class="install-banner-text">
        <strong>アプリとして使う</strong><br>
        ブラウザの「共有」→「ホーム画面に追加」でインストールできます
      </div>
      <button onclick="document.getElementById('install-hint').style.display='none'" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">✕</button>
    </div>

    <div id="home-content"></div>
  </div>

  <!-- RECIPES -->
  <div id="page-recipes" class="page">
    <div id="recipe-list-content"></div>
  </div>

  <!-- PLAN: 献立計画 -->
  <div id="page-plan" class="page">
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">作りたいレシピを選ぶと、共通食材を割り出して買い物リストを作ります</p>
    <div id="plan-content"></div>
    <div id="plan-footer" style="display:none;position:sticky;bottom:80px;padding:12px 0">
      <button class="btn btn-primary btn-full" onclick="addPlanToShopping()">🛒 選択レシピの不足食材をリストへ追加</button>
    </div>
  </div>

  <!-- FRIDGE -->
  <div id="page-fridge" class="page">
    <p class="section-title">冷蔵庫の食材</p>
    <div class="input-row">
      <input type="text" id="fridge-input" placeholder="食材を入力（例: 卵、にんじん）" onkeydown="if(event.key==='Enter')addFridgeItem()">
      <button class="btn btn-primary" onclick="addFridgeItem()">追加</button>
    </div>
    <p class="hint" style="margin-bottom:12px">カンマ区切りで複数入力できます</p>
    <div id="fridge-items"></div>
    <div style="margin-top:16px">
      <button class="btn btn-secondary btn-sm" onclick="clearFridge()" style="color:var(--accent)">🗑 全て削除</button>
    </div>
  </div>

  <!-- SHOPPING -->
  <div id="page-shopping" class="page">
    <div id="shopping-content"></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn active" onclick="showPage('home', null, this)"><span class="nav-icon">🍳</span>今日作れる</button>
    <button class="nav-btn" onclick="showPage('recipes', null, this)"><span class="nav-icon">📖</span>レシピ</button>
    <button class="nav-btn" onclick="showPage('plan', null, this)"><span class="nav-icon">📅</span>献立計画</button>
    <button class="nav-btn" onclick="showPage('fridge', null, this)"><span class="nav-icon">❄️</span>冷蔵庫</button>
    <button class="nav-btn" onclick="showPage('shopping', null, this)"><span class="nav-icon">🛒</span>買い物</button>
  </div>
</div>

<!-- Add Recipe Modal -->
<div class="modal-overlay" id="add-recipe-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('add-recipe-modal')">✕</button>
    <div class="modal-title">📖 レシピを追加</div>

    <div class="url-section">
      <div class="form-group">
        <label class="form-label">🔗 URLから読み込む（Instagram / Cookpad / クラシル等）</label>
        <div class="input-row">
          <input type="text" id="recipe-url" placeholder="https://...">
          <button class="btn btn-primary" onclick="loadFromUrl()" id="url-load-btn">読込</button>
        </div>
        <p class="hint">※ URLからAIがレシピ情報を自動抽出します</p>
        <div id="url-loading" style="display:none" class="loading"><div class="spinner"></div>AIが読み込み中...</div>
      </div>
    </div>

    <div class="or-divider">または手入力</div>

    <div class="form-group">
      <label class="form-label">レシピ名 *</label>
      <input type="text" id="form-title" placeholder="例: 親子丼">
    </div>
    <div class="form-group">
      <label class="form-label">材料（Enterで追加）</label>
      <div class="tag-input-wrap" id="ingredient-tags" onclick="document.getElementById('ingredient-input').focus()">
        <input type="text" id="ingredient-input" placeholder="食材名を入力..." onkeydown="handleIngredientInput(event)">
      </div>
      <p class="hint">入力してEnterで追加。タップで削除できます</p>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（手順・URL等）</label>
      <textarea id="form-memo" placeholder="作り方のメモやURLなど自由に"></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveRecipe()" style="margin-top:8px">💾 保存する</button>
  </div>
</div>

<!-- Recipe Detail Modal -->
<div class="modal-overlay" id="recipe-detail-modal">
  <div class="modal" id="recipe-detail-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== DATA ======
let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
let fridge = JSON.parse(localStorage.getItem('fridge') || '[]');
let shopping = JSON.parse(localStorage.getItem('shopping') || '[]');
let currentIngredients = [];

function save() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('fridge', JSON.stringify(fridge));
  localStorage.setItem('shopping', JSON.stringify(shopping));
}

// ====== NAVIGATION ======
let currentTab = null;
let currentNavBtn = null;
let selectedPlanIds = new Set();

function showPage(name, tabEl, navBtn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const pages = ['home','recipes','plan','fridge','shopping'];
  const idx = pages.indexOf(name);
  if (idx >= 0) {
    document.querySelectorAll('.tab')[idx].classList.add('active');
    document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  }

  renderPage(name);
}

function renderPage(name) {
  if (name === 'home') renderHome();
  else if (name === 'recipes') renderRecipes();
  else if (name === 'plan') renderPlan();
  else if (name === 'fridge') renderFridge();
  else if (name === 'shopping') renderShopping();
}

// ====== MATCHING ======
function matchRecipe(recipe) {
  const fridgeSet = new Set(fridge.map(f => f.toLowerCase()));
  const ingredients = recipe.ingredients || [];
  if (ingredients.length === 0) return { canMake: [], missing: [], score: 0, pct: 0 };
  const canMake = ingredients.filter(i => fridgeSet.has(i.toLowerCase()));
  const missing = ingredients.filter(i => !fridgeSet.has(i.toLowerCase()));
  const pct = Math.round((canMake.length / ingredients.length) * 100);
  return { canMake, missing, score: canMake.length, pct };
}

function getSortedRecipes() {
  return [...recipes].map(r => ({ ...r, match: matchRecipe(r) }))
    .sort((a, b) => b.match.score - a.match.score || b.ingredients.length - a.ingredients.length);
}

// ====== HOME ======
function renderHome() {
  const el = document.getElementById('home-content');
  const sorted = getSortedRecipes();

  // Show install hint once
  const shown = localStorage.getItem('install-hint-shown');
  if (!shown) {
    document.getElementById('install-hint').style.display = 'flex';
    localStorage.setItem('install-hint-shown', '1');
  }

  if (recipes.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><p>まだレシピがありません<br>右上の「＋ レシピ追加」から<br>登録してみましょう！</p></div>`;
    return;
  }
  if (fridge.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">❄️</div><p>冷蔵庫の食材が登録されていません<br>「冷蔵庫」タブから食材を追加すると<br>作れるレシピが表示されます</p></div>
    <div style="margin-top:16px"><p class="section-title">全レシピから選ぶ</p>${sorted.map(r => recipeCardHTML(r, true)).join('')}</div>`;
    return;
  }

  const canMakeAll = sorted.filter(r => r.match.pct === 100);
  const canMakeMost = sorted.filter(r => r.match.pct >= 50 && r.match.pct < 100);
  const others = sorted.filter(r => r.match.pct < 50);

  let html = '';
  if (canMakeAll.length > 0) {
    html += `<p class="section-title">✅ 今すぐ作れる（${canMakeAll.length}品）</p>`;
    html += canMakeAll.map(r => recipeCardHTML(r)).join('');
  }
  if (canMakeMost.length > 0) {
    html += `<p class="section-title">🔥 あと少しで作れる</p>`;
    html += canMakeMost.map(r => recipeCardHTML(r)).join('');
  }
  if (others.length > 0) {
    html += `<p class="section-title">📦 材料をそろえれば作れる</p>`;
    html += others.map(r => recipeCardHTML(r)).join('');
  }
  el.innerHTML = html;
}

function recipeCardHTML(r, showAll) {
  const pct = r.match.pct;
  const badgeClass = pct === 100 ? 'match-100' : pct >= 70 ? 'match-high' : 'match-low';
  const badgeLabel = pct === 100 ? '✅ 全材料あり' : `${pct}% 揃ってる`;

  const canTags = (r.match.canMake || []).map(i => `<span class="tag can-make">${i}</span>`).join('');
  const missTags = (r.match.missing || []).map(i => `<span class="tag missing">✗ ${i}</span>`).join('');

  return `<div class="recipe-card" onclick="showRecipeDetail('${r.id}')">
    <div class="recipe-header">
      <div class="recipe-title">${r.title}</div>
      ${r.ingredients.length > 0 ? `<span class="match-badge ${badgeClass}">${badgeLabel}</span>` : ''}
    </div>
    <div class="ingredient-list">${canTags}${missTags}</div>
    ${r.match.missing.length > 0 ? `<button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="event.stopPropagation();addToShopping(${JSON.stringify(r.match.missing)}, '${r.title}')">🛒 不足分を買い物リストへ</button>` : ''}
  </div>`;
}

// ====== RECIPES PAGE ======
function renderRecipes() {
  const el = document.getElementById('recipe-list-content');
  if (recipes.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><p>レシピがまだありません<br>右上の「＋ レシピ追加」から<br>登録してみましょう！</p></div>`;
    return;
  }
  el.innerHTML = `<p style="font-size:13px;color:var(--text2);margin-bottom:16px">登録済みレシピ ${recipes.length}品</p>` +
    recipes.map(r => `
    <div class="recipe-card">
      <div class="recipe-header">
        <div class="recipe-title">${r.title}</div>
        <button class="btn btn-secondary btn-sm" style="color:var(--accent);flex-shrink:0" onclick="deleteRecipe('${r.id}')">🗑 削除</button>
      </div>
      <div class="ingredient-list">${r.ingredients.map(i => `<span class="tag">${i}</span>`).join('')}</div>
      ${r.memo ? `<p style="font-size:12px;color:var(--text2);margin-top:8px;word-break:break-all">${r.memo.substring(0,80)}${r.memo.length>80?'...':''}</p>` : ''}
    </div>`).join('');
}

// ====== PLAN PAGE ======
function renderPlan() {
  const el = document.getElementById('plan-content');
  const footer = document.getElementById('plan-footer');

  if (recipes.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>レシピがまだありません<br>右上から追加しましょう</p></div>`;
    footer.style.display = 'none';
    return;
  }

  // Count how many selected recipes use each ingredient
  const selectedRecipes = recipes.filter(r => selectedPlanIds.has(r.id));
  const ingredientCount = {};
  selectedRecipes.forEach(r => {
    r.ingredients.forEach(ing => {
      ingredientCount[ing] = (ingredientCount[ing] || 0) + 1;
    });
  });

  // Sort recipes: selected first, then by common ingredients with selected
  const sorted = [...recipes].sort((a, b) => {
    const aSelected = selectedPlanIds.has(a.id);
    const bSelected = selectedPlanIds.has(b.id);
    if (aSelected && !bSelected) return -1;
    if (!aSelected && bSelected) return 1;
    // Count shared ingredients with already-selected recipes
    const aShared = a.ingredients.filter(i => ingredientCount[i] > 0).length;
    const bShared = b.ingredients.filter(i => ingredientCount[i] > 0).length;
    return bShared - aShared;
  });

  let html = '';
  if (selectedPlanIds.size > 0) {
    // Show summary of what's needed
    const fridgeSet = new Set(fridge.map(f => f.toLowerCase()));
    const allNeeded = new Set();
    const alreadyHave = new Set();
    selectedRecipes.forEach(r => {
      r.ingredients.forEach(ing => {
        if (fridgeSet.has(ing.toLowerCase())) alreadyHave.add(ing);
        else allNeeded.add(ing);
      });
    });

    html += `<div class="card" style="margin-bottom:16px;border-color:rgba(255,107,107,0.3)">
      <div style="font-weight:700;margin-bottom:10px">📋 ${selectedPlanIds.size}品のレシピ選択中</div>
      ${alreadyHave.size > 0 ? `<div style="margin-bottom:8px"><span style="font-size:11px;color:var(--accent3);font-weight:700">✅ 冷蔵庫にある</span><div class="ingredient-list" style="margin-top:4px">${[...alreadyHave].map(i=>`<span class="tag can-make">${i}</span>`).join('')}</div></div>` : ''}
      ${allNeeded.size > 0 ? `<div><span style="font-size:11px;color:var(--accent);font-weight:700">✗ 買う必要がある（${allNeeded.size}品）</span><div class="ingredient-list" style="margin-top:4px">${[...allNeeded].map(i=>`<span class="tag missing">${i} ${ingredientCount[i]>1?`<span style="font-size:10px;opacity:0.7">×${ingredientCount[i]}</span>`:''}</span>`).join('')}</div></div>` : `<p style="color:var(--accent3);font-size:13px">✅ 全ての材料が揃っています！</p>`}
    </div>`;

    html += `<p class="section-title">レシピを選択</p>`;
  } else {
    html += `<p class="section-title">作りたいレシピを選ぶ</p>`;
  }

  sorted.forEach(r => {
    const isSelected = selectedPlanIds.has(r.id);
    const sharedCount = r.ingredients.filter(i => ingredientCount[i] > 0 && !selectedPlanIds.has(r.id)).length;
    const fridgeSet = new Set(fridge.map(f => f.toLowerCase()));
    const missingCount = r.ingredients.filter(i => !fridgeSet.has(i.toLowerCase())).length;

    html += `<div class="plan-recipe-card ${isSelected ? 'selected' : ''}" onclick="togglePlanRecipe('${r.id}')">
      <div class="plan-check">${isSelected ? '✓' : ''}</div>
      <div class="plan-recipe-info">
        <div class="plan-recipe-title">${r.title}</div>
        <div class="plan-recipe-sub">
          ${missingCount > 0 ? `不足: ${missingCount}品` : '✅ 全材料あり'}
          ${sharedCount > 0 ? ` · <span class="common-badge">共通食材 ${sharedCount}品</span>` : ''}
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
  footer.style.display = selectedPlanIds.size > 0 ? 'block' : 'none';
}

function togglePlanRecipe(id) {
  if (selectedPlanIds.has(id)) selectedPlanIds.delete(id);
  else selectedPlanIds.add(id);
  renderPlan();
}

function addPlanToShopping() {
  const fridgeSet = new Set(fridge.map(f => f.toLowerCase()));
  const selectedRecipes = recipes.filter(r => selectedPlanIds.has(r.id));
  const missing = new Set();
  const sourceMap = {};
  selectedRecipes.forEach(r => {
    r.ingredients.forEach(ing => {
      if (!fridgeSet.has(ing.toLowerCase())) {
        missing.add(ing);
        if (!sourceMap[ing]) sourceMap[ing] = [];
        sourceMap[ing].push(r.title);
      }
    });
  });
  let added = 0;
  missing.forEach(name => {
    if (!shopping.find(s => s.name === name)) {
      shopping.push({ id: Date.now() + Math.random(), name, source: sourceMap[name].join('・'), checked: false });
      added++;
    }
  });
  save();
  if (added > 0) {
    toast(`🛒 ${added}品を買い物リストに追加しました`);
    showPage('shopping');
  } else {
    toast('全てリスト済みです');
  }
}

// ====== FRIDGE ======
function renderFridge() {
  const el = document.getElementById('fridge-items');
  if (fridge.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">❄️</div><p>食材を追加してください</p></div>`;
    return;
  }
  el.innerHTML = `<div class="fridge-grid">${fridge.map(item =>
    `<div class="fridge-item">${item}<button onclick="removeFridgeItem('${item}')">✕</button></div>`
  ).join('')}</div>`;
}

function addFridgeItem() {
  const input = document.getElementById('fridge-input');
  const items = input.value.split(/[,、，\n]/).map(s => s.trim()).filter(s => s && !fridge.includes(s));
  if (items.length === 0) return;
  fridge.push(...items);
  save();
  renderFridge();
  input.value = '';
  toast(`✅ ${items.join('、')} を追加しました`);
}

function removeFridgeItem(item) {
  fridge = fridge.filter(f => f !== item);
  save();
  renderFridge();
}

function clearFridge() {
  if (!confirm('冷蔵庫の食材を全て削除しますか？')) return;
  fridge = [];
  save();
  renderFridge();
}

// ====== SHOPPING ======
function renderShopping() {
  const el = document.getElementById('shopping-content');

  // Gather all missing ingredients from all recipes
  const allMissing = {};
  getSortedRecipes().forEach(r => {
    r.match.missing.forEach(ing => {
      if (!allMissing[ing]) allMissing[ing] = [];
      allMissing[ing].push(r.title);
    });
  });

  let html = '';

  if (shopping.length > 0) {
    html += `<p class="section-title">買い物リスト (${shopping.filter(s=>!s.checked).length}件)</p>`;
    html += shopping.map(item =>
      `<div class="shop-item ${item.checked ? 'checked' : ''}" id="shop-${item.id}">
        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleShop('${item.id}')">
        <div>
          <div class="shop-name">${item.name} ${item.checked ? '<span style="font-size:11px;color:var(--accent3)">❄️ 冷蔵庫へ追加済み</span>' : ''}</div>
          ${item.source ? `<div class="shop-source">📖 ${item.source}</div>` : ''}
        </div>
        <button class="btn btn-secondary btn-sm" onclick="removeShop('${item.id}')">✕</button>
      </div>`
    ).join('');

    html += `<div style="display:flex;gap:8px;margin-bottom:24px;margin-top:4px">
      <button class="btn btn-secondary btn-sm" onclick="clearChecked()">✅ チェック済みを削除</button>
      <button class="btn btn-secondary btn-sm" style="color:var(--accent)" onclick="clearAllShopping()">全削除</button>
    </div>`;
  }

  if (Object.keys(allMissing).length > 0) {
    html += `<p class="section-title">📌 レシピの不足食材</p>`;
    html += `<p style="font-size:12px;color:var(--text2);margin-bottom:12px">共通食材が多いレシピから表示しています</p>`;
    const sorted2 = getSortedRecipes().filter(r => r.match.missing.length > 0 && r.match.pct >= 30);
    sorted2.forEach(r => {
      html += `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:14px">${r.title}</strong>
          <span style="font-size:11px;color:var(--text2)">${r.match.score}/${r.ingredients.length} 揃ってる</span>
        </div>
        <div class="ingredient-list">${r.match.missing.map(i=>`<span class="tag missing">✗ ${i}</span>`).join('')}</div>
        <button class="btn btn-success btn-sm" style="margin-top:10px" onclick="addToShopping(${JSON.stringify(r.match.missing)}, '${r.title}')">🛒 リストに追加</button>
      </div>`;
    });
  }

  if (shopping.length === 0 && Object.keys(allMissing).length === 0) {
    html = `<div class="empty"><div class="empty-icon">🛒</div><p>買い物リストは空です<br>「今日作れる」タブから<br>不足食材を追加できます</p></div>`;
  }

  el.innerHTML = html;
}

function addToShopping(items, source) {
  let added = 0;
  items.forEach(name => {
    if (!shopping.find(s => s.name === name)) {
      shopping.push({ id: Date.now() + Math.random(), name, source, checked: false });
      added++;
    }
  });
  save();
  renderShopping();
  if (added > 0) toast(`🛒 ${added}品を買い物リストに追加しました`);
  else toast('すでにリストにあります');
}

function toggleShop(id) {
  const item = shopping.find(s => s.id == id);
  if (!item) return;
  item.checked = !item.checked;
  // Auto-add to fridge when checked
  if (item.checked && !fridge.includes(item.name)) {
    fridge.push(item.name);
    toast(`❄️ 「${item.name}」を冷蔵庫に追加しました`);
  } else if (!item.checked) {
    // Uncheck: remove from fridge
    fridge = fridge.filter(f => f !== item.name);
  }
  save();
  renderShopping();
}
function removeShop(id) {
  shopping = shopping.filter(s => s.id != id);
  save();
  renderShopping();
}
function clearChecked() {
  shopping = shopping.filter(s => !s.checked);
  save();
  renderShopping();
}
function clearAllShopping() {
  if (!confirm('買い物リストを全て削除しますか？')) return;
  shopping = [];
  save();
  renderShopping();
}

// ====== RECIPE DETAIL ======
function showRecipeDetail(id) {
  const r = recipes.find(r => r.id === id);
  if (!r) return;
  const m = matchRecipe(r);
  const el = document.getElementById('recipe-detail-content');
  el.innerHTML = `
    <button class="modal-close" onclick="closeModal('recipe-detail-modal')">✕</button>
    <div class="modal-title">${r.title}</div>
    ${r.ingredients.length > 0 ? `
      <p class="section-title">材料</p>
      <div class="ingredient-list">
        ${r.ingredients.map(i => `<span class="tag ${m.canMake.includes(i)?'can-make':m.missing.includes(i)?'missing':''}">${i}</span>`).join('')}
      </div>
      ${m.missing.length > 0 ? `<button class="btn btn-success btn-sm" style="margin-top:12px" onclick="addToShopping(${JSON.stringify(m.missing)}, '${r.title}')">🛒 不足分を買い物リストへ</button>` : `<p style="color:var(--accent3);font-size:13px;margin-top:10px">✅ 全ての材料が揃っています！</p>`}
    ` : ''}
    ${r.memo ? `<p class="section-title" style="margin-top:20px">メモ</p><p style="font-size:14px;line-height:1.8;word-break:break-all;color:var(--text2)">${r.memo.replace(/https?:\/\/\S+/g, url => `<a href="${url}" target="_blank" style="color:var(--accent)">${url}</a>`)}</p>` : ''}
    <div style="margin-top:20px;display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="deleteRecipe('${r.id}');closeModal('recipe-detail-modal')">🗑 削除</button>
    </div>
  `;
  document.getElementById('recipe-detail-modal').classList.add('open');
}

// ====== RECIPE MODAL ======
function openAddRecipe() {
  currentIngredients = [];
  document.getElementById('form-title').value = '';
  document.getElementById('form-memo').value = '';
  document.getElementById('recipe-url').value = '';
  renderIngredientTags();
  document.getElementById('add-recipe-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function handleIngredientInput(e) {
  if (e.key === 'Enter' || e.key === ',' || e.key === '、') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !currentIngredients.includes(val)) {
      currentIngredients.push(val);
      renderIngredientTags();
    }
    e.target.value = '';
  }
}

function renderIngredientTags() {
  const wrap = document.getElementById('ingredient-tags');
  const input = document.getElementById('ingredient-input');
  wrap.innerHTML = '';
  currentIngredients.forEach((ing, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${ing} <span class="remove" onclick="removeIngredient(${i})">✕</span>`;
    wrap.appendChild(tag);
  });
  wrap.appendChild(input);
  input.focus();
}

function removeIngredient(i) {
  currentIngredients.splice(i, 1);
  renderIngredientTags();
}

function saveRecipe() {
  // flush any pending input
  const pending = document.getElementById('ingredient-input').value.trim();
  if (pending && !currentIngredients.includes(pending)) currentIngredients.push(pending);

  const title = document.getElementById('form-title').value.trim();
  if (!title) { toast('⚠️ レシピ名を入力してください'); return; }

  recipes.push({
    id: Date.now().toString(),
    title,
    ingredients: [...currentIngredients],
    memo: document.getElementById('form-memo').value.trim(),
    createdAt: Date.now()
  });
  save();
  closeModal('add-recipe-modal');
  toast('✅ レシピを保存しました');
  renderPage(getCurrentPage());
}

function deleteRecipe(id) {
  if (!confirm('このレシピを削除しますか？')) return;
  recipes = recipes.filter(r => r.id !== id);
  save();
  renderPage(getCurrentPage());
}

function getCurrentPage() {
  const active = document.querySelector('.page.active');
  return active ? active.id.replace('page-', '') : 'home';
}

// ====== URL LOAD (AI) ======
async function loadFromUrl() {
  const url = document.getElementById('recipe-url').value.trim();
  if (!url) { toast('URLを入力してください'); return; }

  document.getElementById('url-loading').style.display = 'flex';
  document.getElementById('url-load-btn').disabled = true;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `あなたはレシピ情報抽出AIです。与えられたURLまたは情報からレシピを抽出し、必ずJSONのみを返してください。マークダウンやバッククォートは不要です。
JSONフォーマット: {"title": "レシピ名", "ingredients": ["食材1", "食材2"], "memo": "手順や補足"}
食材は「食材名のみ」（分量なし）でリストアップしてください。URLにアクセスできない場合はURLをメモに入れてtitleとingredientsは空で返してください。`,
        messages: [{ role: "user", content: `このURLのレシピを抽出してください: ${url}` }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (parsed.title) document.getElementById('form-title').value = parsed.title;
    if (parsed.ingredients) {
      currentIngredients = parsed.ingredients;
      renderIngredientTags();
    }
    if (parsed.memo) document.getElementById('form-memo').value = parsed.memo;
    toast('✅ 読み込み完了！確認して保存してください');
  } catch (e) {
    // Fallback: just store URL in memo
    document.getElementById('form-memo').value = url;
    toast('⚠️ 自動読み込みできませんでした。手入力してください');
  }

  document.getElementById('url-loading').style.display = 'none';
  document.getElementById('url-load-btn').disabled = false;
}

// ====== TOAST ======
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

renderHome();
